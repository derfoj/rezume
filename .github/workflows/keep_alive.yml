name: Keep Backend Awake

on:
  schedule:
    # Lance le ping toutes les 12 minutes
    - cron: '*/12 * * * *'
  workflow_dispatch: # Permet de le lancer manuellement pour tester

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render Backend
        run: |
          curl -s https://rezume-df8h.onrender.com/ > /dev/null
          echo "Ping sent to Render at $(date)"
